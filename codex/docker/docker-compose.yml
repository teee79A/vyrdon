services:
  codex-engineering-node:
    container_name: codex-engineering-node
    hostname: asus-vse-01
    build:
      context: /home/t79/ASUS/codex
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    pids_limit: 256
    init: true
    environment:
      NODE_ENV: production
      CODEX_PORT: "4000"
      CODEX_BIND_HOST: "0.0.0.0"
      REQUIRE_CONTAINER_RUNTIME: "true"
      ASUS_CODEX_ROOT: /app
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      BOOTSTRAP_SIGNATURE_REQUIRED: "true"
      BOOTSTRAP_SIGNATURE_FILE: /app/system/bootstrap.sig
      BOOTSTRAP_PUBLIC_KEY_FILE: /run/secrets/bootstrap_public_key
    secrets:
      - openai_api_key
      - bootstrap_public_key
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - /etc/machine-id:/etc/machine-id:ro
      - /home/t79/ASUS/codex/system:/app/system:rw
      - /home/t79/ASUS/codex/memory:/app/memory:rw
      - /home/t79/ASUS/codex/workspace:/app/workspace:rw
      - /home/t79/ASUS/codex/archive:/app/archive:rw
      - /home/t79/ASUS/codex/logs:/app/logs:rw
      - /home/t79/ASUS/codex/config:/app/config:rw
      - /home/t79/ASUS/codex/rules:/app/rules:rw
      - /home/t79/ASUS/codex/policies.json:/app/policies.json:ro
    networks:
      - codex_net

secrets:
  openai_api_key:
    file: /home/t79/.asus_secrets/openai.key
  bootstrap_public_key:
    file: /home/t79/.asus_secrets/bootstrap_ed25519.pub

networks:
  codex_net:
    name: codex-engineering-net
    driver: bridge
